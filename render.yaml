services:
  - type: web
    name: overclock-rescue-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: STAFF_AUTH_REQUIRED
        value: "true"
      - key: CORS_ORIGINS
        value: https://your-project.web.app,https://your-project.firebaseapp.com
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash